name: Deploy Frontend

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  STAGE: ${{ github.ref_name == 'main' && 'prod' || 'qa' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'qa' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_AWS_REGION: ${{ vars.VITE_AWS_REGION }}
          VITE_MAP_STYLE: ${{ vars.VITE_MAP_STYLE }}
          VITE_MAP_API_KEY: ${{ secrets.VITE_MAP_API_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ vars.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.FRONTEND_CLOUDFRONT_ID }} \
            --paths "/*"
