name: Destroy ECS Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy"
        required: true
        type: choice
        options:
          - qa
          - prod

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'sa-east-1' }}
  APP_NAME: ${{ vars.APP_NAME || 'armadillo-tracker' }}
  STAGE: ${{ inputs.environment }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Resolve state bucket
        id: tfstate
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          if [ -n "${{ vars.TF_STATE_BUCKET }}" ]; then
            BUCKET_NAME="${{ vars.TF_STATE_BUCKET }}"
          else
            BUCKET_NAME="${APP_NAME}-tfstate-${STAGE}-${AWS_REGION}-${ACCOUNT_ID}"
          fi
          echo "name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.tfstate.outputs.name }}" \
            -backend-config="key=${APP_NAME}/${STAGE}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: infra
        run: |
          terraform destroy -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="app_name=${APP_NAME}" \
            -var="stage=${STAGE}" \
            -var="geofence_collection=${{ vars.GEOFENCE_COLLECTION }}" \
            -var="route_calculator=${{ vars.ROUTE_CALCULATOR }}" \
            -var="container_image=placeholder"
